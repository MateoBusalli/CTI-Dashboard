services:
  ollama:
    image: ollama/ollama:latest
    container_name: cti-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - cti-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: cti-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "dolphin-llama3"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - cti-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: cti-elasticsearch
    restart: unless-stopped
    env_file: .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=cti-cluster
      - cluster.routing.allocation.disk.watermark.low=95%
      - cluster.routing.allocation.disk.watermark.high=98%
      - cluster.routing.allocation.disk.watermark.flood_stage=99%
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - cti-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cti-backend
    restart: unless-stopped
    env_file: .env
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      DATA_DIR: /data
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: dolphin-llama3
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      elasticsearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - cti-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cti-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - cti-network

volumes:
  es_data:
    driver: local
  ollama_data:
    driver: local

networks:
  cti-network:
    driver: bridge
